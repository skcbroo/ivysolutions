name: Tests

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (typecheck + tests + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: senha123
          POSTGRES_DB: ivysolutions
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U admin -d ivysolutions"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - working-directory: backend
        run: npm ci
      - working-directory: backend
        run: npm run typecheck
      - working-directory: backend
        run: npm test
        env:
          DATABASE_URL: postgres://admin:senha123@localhost:5432/ivysolutions
          JWT_SECRET: ci-jwt-secret-32-chars-min-please!
          ALLOW_REGISTRATION: 'true'
          NODE_ENV: test

  frontend:
    name: Frontend (typecheck + tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - working-directory: frontend
        run: npm ci
      - working-directory: frontend
        run: npx tsc --noEmit
      - working-directory: frontend
        run: npm test
